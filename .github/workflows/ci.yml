name: Core CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  core:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: pymesec_ci
          MYSQL_USER: pymesec
          MYSQL_PASSWORD: pymesec
        ports:
          - 3306/tcp
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: bcmath, intl, mbstring, pdo_mysql, pdo_sqlite, zip
          tools: composer:v2
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.composer/cache/files
            core/vendor
          key: ${{ runner.os }}-php-8.4-composer-${{ hashFiles('core/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-8.4-composer-

      - name: Prepare environment
        working-directory: core
        run: cp .env.example .env

      - name: Install dependencies
        working-directory: core
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Generate application key
        working-directory: core
        run: php artisan key:generate --force

      - name: Migration smoke-check (MySQL)
        working-directory: core
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: ${{ job.services.mysql.ports['3306'] }}
          DB_DATABASE: pymesec_ci
          DB_USERNAME: pymesec
          DB_PASSWORD: pymesec
        run: php artisan migrate:fresh --force

      - name: Lint
        working-directory: core
        run: composer lint

      - name: Guardrail plugin api_context include path
        run: |
          if rg -n "dirname\(__DIR__, 3\).*/core/routes/api_context.php" plugins/*/routes/api.php; then
            echo "Detected fragile plugin api_context include path; use base_path('routes/api_context.php')."
            exit 1
          fi

      - name: Verify OpenAPI artifacts
        working-directory: core
        run: php artisan openapi:publish --check

      - name: Test
        working-directory: core
        run: composer test

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22.x'

      - name: Test MCP Go binary
        run: cd mcp && go test ./...

      - name: Compile MCP Go binaries
        run: make compile
