services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-pymesec}-app
    working_dir: /var/www/html
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    volumes:
      - ./core:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pymesec

  web:
    image: nginx:1.27-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-pymesec}-web
    depends_on:
      - app
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./core:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - pymesec

  postgres:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-pymesec}-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pymesec}
      POSTGRES_USER: ${POSTGRES_USER:-pymesec}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pymesec}
    ports:
      - "${POSTGRES_PORT:-54329}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pymesec} -d ${POSTGRES_DB:-pymesec}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - pymesec

  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-pymesec}-redis
    ports:
      - "${REDIS_PORT:-63790}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - pymesec

volumes:
  postgres_data:

networks:
  pymesec:
    driver: bridge
